<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylish Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1a1a1a; /* Dark background like the screenshot */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-container {
            display: flex;
            width: 1000px;
            height: 700px;
            background-color: #fff;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* Left Section: Feature Image */
        .image-section {
            flex: 1;
            overflow: hidden;
        }

        .image-section img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures the image covers the section without stretching */
            display: block;
        }

        /* Right Section: Form */
        .form-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .form-wrapper {
            width: 100%;
            max-width: 320px;
        }

        .logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo img {
            width: 70px; /* Adjust logo size as needed */
            margin-bottom: 10px;
        }

        /* Input styling */
        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input[type="text"], 
        input[type="password"] {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #d1d1d1;
            border-radius: 12px;
            background-color: #f1e4e2; /* Matching the soft peach/pink input background */
            font-size: 1rem;
            outline: none;
        }

        /* Placeholder styling */
        input::placeholder {
            color: #aaa;
            font-size: 0.9rem;
        }

        /* Checkbox section */
        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .remember-me input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #3f42e6, #3034d3);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        /* Forgot password link */
        .forgot-password {
            display: block;
            text-align: left;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #333;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="image-section">
            <img src="c0c7ad4db0592f96a4ac172081663314.jpg" alt="Fashion Model in Blue Floral Dress">
        </div>

        <div class="form-section">
            <div class="form-wrapper">
                <div class="logo">
                    <img src="logo.jpg" alt="Stylish Clothing Brand ">
                </div>

                <form id="loginForm">
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Enter the Username" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter the Password" required>
                    </div>

                    <div class="remember-me">
                        <label>Remember Me</label>
                        <input type="checkbox">
                    </div>

                    <button type="submit" class="login-btn">Login</button>
                    
                    <a href="#" class="forgot-password">Forgot password</a>
                </form>
            </div>
        </div>
    </div>
   <script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault(); // stop refresh

    // get values (optional)
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if(username !== "" && password !== "") {
        alert("Login successful!");
        window.location.href = "home.html"; // or index.html
    } else {
        alert("Please enter username and password");
    }
});
</script>
</body>
</html>
