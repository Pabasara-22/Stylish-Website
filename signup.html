<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylish - Sign Up</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1a1a1a; /* Dark background like the screenshot */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            display: flex;
            width: 1000px;
            height: 700px;
            background-color: #fff;
            border-radius: 4px; /* Slight corner rounding */
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* Form Section (Left Side) */
        .form-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 50px;
        }

        .form-wrapper {
            width: 100%;
            max-width: 320px; /* Kept narrow for the centered look */
        }

        .logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo img {
            width: 65px; /* Adjust logo size as needed */
            margin-bottom: 5px;
        }

        /* Input styling */
        .input-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: #333;
            font-weight: 500;
        }

        input[type="text"], 
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d1d1;
            border-radius: 8px; /* Softer rounded corners */
            background-color: #f1e4e2; /* Matching the soft peach/pink input background */
            font-size: 0.95rem;
            outline: none;
        }

        /* Placeholder styling */
        input::placeholder {
            color: #aaa;
            font-size: 0.85rem;
        }

        /* Checkbox section */
        .terms {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 15px 0;
            font-size: 0.8rem;
        }

        .terms label {
            margin-bottom: 0;
            cursor: pointer;
        }

        /* Sign-In Button */
        .signup-btn {
            width: 100%;
            padding: 13px;
            background-color: #3b42e1; /* Vibrant blue from image */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .signup-btn:hover {
            background-color: #2c35d3;
        }

        /* Image Section (Right Side) */
        .image-section {
            flex: 1;
            overflow: hidden;
        }

        .image-section img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures the male model fills the section perfectly */
            display: block;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="form-section">
            <div class="form-wrapper">
                
                <div class="logo">
                    <img src="logo.jpg" alt="Stylish Clothing Brand Logo">
                </div>

                <form id="signupForm">
                    <div class="input-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" placeholder="Enter the name" required>
                    </div>

                    <div class="input-group">
                        <label for="contact">Contact number</label>
                        <input type="text" id="contact" placeholder="Enter your contact number" required>
                    </div>

                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter your Email Address" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter the Password" required>
                    </div>

                    <div class="terms">
                        <input type="checkbox" id="agree">
                        <label for="agree">I agree to the teams & policy</label>
                    </div>

                    <button type="submit" class="signup-btn">Sign in</button>
                </form>
            </div>
        </div>

        <div class="image-section">
            <img src="brown.jpg" alt="Fashion Model in Brown Shirt">
        </div>
    </div>
    <script>
document.getElementById("signupForm").addEventListener("submit", function(e) {
    e.preventDefault(); // stop refresh

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const agree = document.getElementById("agree").checked;

    if(name !== "" && email !== "" && password !== "" && agree) {
        alert("Signup successful!");

        // redirect to home page
        window.location.href = "home.html"; // or index.html
    } else {
        alert("Please fill all fields and agree to terms");
    }
});
</script>
</body>
</html>
